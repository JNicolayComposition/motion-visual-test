<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Motion Visual</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h2 {
      margin: 12px 0 8px;
      font-size: 22px;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding: 0 10px;
    }

    select, button {
      font-size: 17px;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
    }

    button {
      cursor: pointer;
    }

    #status {
      margin: 6px 0 10px;
      font-size: 14px;
      opacity: 0.9;
      padding: 0 12px;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 80vh;
      touch-action: none;
    }
  </style>
</head>
<body>
  <h2>Motion Visual</h2>

  <div class="controls">
    <select id="roleSelect">
      <option value="Piano1">Piano1</option>
      <option value="Piano2">Piano2</option>
      <option value="Perc1">Perc1</option>
      <option value="Perc2">Perc2</option>
      <option value="AllForms">All Forms</option>
    </select>

    <select id="modeSelect">
      <option value="tilt">Tilt Mode</option>
      <option value="impulse">Impulse Mode</option>
    </select>

    <select id="sceneSelect">
      <option value="A">Scene A: Residual</option>
      <option value="B">Scene B: Articulation</option>
      <option value="C">Scene C: Saturation</option>
      <option value="D">Scene D: Inversion</option>
    </select>

    <button id="startBtn">Enable Motion</button>
  </div>

  <div id="status">waiting...</div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const roleSelect = document.getElementById("roleSelect");
    const modeSelect = document.getElementById("modeSelect");
    const sceneSelect = document.getElementById("sceneSelect");
    const startBtn = document.getElementById("startBtn");

    let ax = 0, ay = 0, az = 0;
    let beta = 0, gamma = 0;

    let filteredX = 0;
    let filteredY = 0;
    let motionEnergy = 0;

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function attackRelease(current, target, attack, release) {
      if (target > current) {
        return current * (1 - attack) + target * attack;
      } else {
        return current * (1 - release) + target * release;
      }
    }

    function getRoleColor(role) {
      if (role === "Piano1") return [255, 120, 200]; // pink
      if (role === "Piano2") return [120, 255, 120]; // green
      if (role === "Perc1")  return [255, 100, 100]; // red
      if (role === "Perc2")  return [100, 120, 255]; // blue
      return [255, 255, 255];
    }

    function getSceneParams(scene) {
      if (scene === "A") {
        return {
          name: "Residual",
          baseSize: 0.018,
          scaleGain: 0.25,
          maxScale: 1.7,
          brightnessBase: 0.08,
          brightnessGain: 0.10,
          inactiveBrightness: 0.025,
          attackImpulse: 0.72,
          releaseImpulse: 0.030,
          attackTilt: 0.22,
          releaseTilt: 0.16,
          energyAttack: 0.35,
          energyRelease: 0.030,
          glowSpread: 0.82,
          formAlpha: 0.68,
          formGlow: 18,
          glowColor: [255, 255, 255],
          baseBgMix: 0.10,
          bgContrast: 0.70,
          invertMode: false
        };
      }

      if (scene === "B") {
        return {
          name: "Articulation",
          baseSize: 0.03,
          scaleGain: 0.42,
          maxScale: 2.8,
          brightnessBase: 0.16,
          brightnessGain: 0.20,
          inactiveBrightness: 0.05,
          attackImpulse: 0.82,
          releaseImpulse: 0.045,
          attackTilt: 0.30,
          releaseTilt: 0.18,
          energyAttack: 0.45,
          energyRelease: 0.035,
          glowSpread: 0.70,
          formAlpha: 1.0,
          formGlow: 8,
          glowColor: [255, 255, 255],
          baseBgMix: 0.18,
          bgContrast: 1.25,
          invertMode: false
        };
      }

      if (scene === "C") {
        return {
          name: "Saturation",
          baseSize: 0.05,
          scaleGain: 0.65,
          maxScale: 3.6,
          brightnessBase: 0.26,
          brightnessGain: 0.36,
          inactiveBrightness: 0.10,
          attackImpulse: 0.86,
          releaseImpulse: 0.060,
          attackTilt: 0.36,
          releaseTilt: 0.22,
          energyAttack: 0.52,
          energyRelease: 0.05,
          glowSpread: 0.62,
          formAlpha: 0.97,
          formGlow: 28,
          glowColor: [255, 225, 150],
          baseBgMix: 0.28,
          bgContrast: 1.55,
          invertMode: false
        };
      }

      return {
        name: "Inversion",
        baseSize: 0.03,
        scaleGain: 0.50,
        maxScale: 3.0,
        brightnessBase: 0.08,
        brightnessGain: 0.70,
        inactiveBrightness: 0.04,
        attackImpulse: 0.82,
        releaseImpulse: 0.05,
        attackTilt: 0.32,
        releaseTilt: 0.20,
        energyAttack: 0.55,
        energyRelease: 0.05,
        glowSpread: 0.70,
        formAlpha: 0.72,
        formGlow: 18,
        glowColor: [255, 255, 255],
        baseBgMix: 0.08,
        bgContrast: 1.2,
        invertMode: true
      };
    }

    async function startMotion() {
      statusEl.textContent = "requesting permission...";

      try {
        const needsPermission =
          typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function";

        if (needsPermission) {
          const motionPermission = await DeviceMotionEvent.requestPermission();
          let orientationPermission = "granted";

          if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
          ) {
            orientationPermission = await DeviceOrientationEvent.requestPermission();
          }

          if (motionPermission === "granted" && orientationPermission === "granted") {
            window.addEventListener("devicemotion", handleMotion);
            window.addEventListener("deviceorientation", handleOrientation);
            statusEl.textContent = "motion ON";
          } else {
            statusEl.textContent =
              "denied: motion=" + motionPermission + ", orientation=" + orientationPermission;
          }
        } else {
          window.addEventListener("devicemotion", handleMotion);
          window.addEventListener("deviceorientation", handleOrientation);
          statusEl.textContent = "motion ON";
        }
      } catch (e) {
        statusEl.textContent = "error: " + e;
      }
    }

    function handleOrientation(e) {
      beta = e.beta || 0;
      gamma = e.gamma || 0;
    }

    function handleMotion(e) {
      const acc = e.accelerationIncludingGravity || e.acceleration || { x: 0, y: 0, z: 0 };

      ax = acc.x || 0;
      ay = acc.y || 0;
      az = acc.z || 0;

      const mode = modeSelect.value;
      const scene = getSceneParams(sceneSelect.value);

      let targetX = 0;
      let targetY = 0;

      if (mode === "tilt") {
        targetX = clamp(Math.abs(gamma) / 18, 0, 2.5);
        targetY = clamp(Math.abs(beta) / 22, 0, 2.5);

        filteredX = attackRelease(filteredX, targetX, scene.attackTilt, scene.releaseTilt);
        filteredY = attackRelease(filteredY, targetY, scene.attackTilt, scene.releaseTilt);
      } else {
        targetX = clamp(Math.abs(ax), 0, 10);
        targetY = clamp(Math.abs(ay), 0, 10);

        filteredX = attackRelease(filteredX, targetX, scene.attackImpulse, scene.releaseImpulse);
        filteredY = attackRelease(filteredY, targetY, scene.attackImpulse, scene.releaseImpulse);
      }

      const total = clamp(Math.abs(ax) + Math.abs(ay) + Math.abs(az - 9.81), 0, 24);
      motionEnergy = attackRelease(motionEnergy, total, scene.energyAttack, scene.energyRelease);

      statusEl.textContent =
        roleSelect.value +
        " | " + mode +
        " | Scene " + sceneSelect.value + " (" + scene.name + ")" +
        " | ax:" + ax.toFixed(2) +
        " ay:" + ay.toFixed(2) +
        " beta:" + beta.toFixed(1) +
        " gamma:" + gamma.toFixed(1);
    }

    function drawGlow(cx, cy, rgb, alpha, w, h, spread) {
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * spread);
      grad.addColorStop(0, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`);
      grad.addColorStop(0.50, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha * 0.55})`);
      grad.addColorStop(1, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function drawShapeGlow(shadowColor, shadowBlur) {
      ctx.shadowColor = shadowColor;
      ctx.shadowBlur = shadowBlur;
    }

    function clearShapeGlow() {
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
    }

    function drawCircle(cx, cy, sx, sy, fillStyle, alpha, glowColor, glowBlur) {
      ctx.save();
      drawShapeGlow(`rgba(${glowColor[0]},${glowColor[1]},${glowColor[2]},0.95)`, glowBlur);
      ctx.beginPath();
      ctx.ellipse(cx, cy, 48 * sx, 48 * sy, 0, 0, Math.PI * 2);
      ctx.fillStyle = fillStyle(alpha);
      ctx.fill();
      clearShapeGlow();
      ctx.restore();
    }

    function drawTriangle(cx, cy, sx, sy, fillStyle, alpha, glowColor, glowBlur) {
      ctx.save();
      drawShapeGlow(`rgba(${glowColor[0]},${glowColor[1]},${glowColor[2]},0.95)`, glowBlur);
      ctx.beginPath();
      ctx.moveTo(cx, cy - 42 * sy);
      ctx.lineTo(cx - 38 * sx, cy + 32 * sy);
      ctx.lineTo(cx + 38 * sx, cy + 32 * sy);
      ctx.closePath();
      ctx.fillStyle = fillStyle(alpha);
      ctx.fill();
      clearShapeGlow();
      ctx.restore();
    }

    function drawSquare(cx, cy, sx, sy, fillStyle, alpha, glowColor, glowBlur) {
      ctx.save();
      drawShapeGlow(`rgba(${glowColor[0]},${glowColor[1]},${glowColor[2]},0.95)`, glowBlur);
      const w = 76 * sx;
      const h = 76 * sy;
      ctx.fillStyle = fillStyle(alpha);
      ctx.fillRect(cx - w / 2, cy - h / 2, w, h);
      clearShapeGlow();
      ctx.restore();
    }

    function drawPentagon(cx, cy, sx, sy, fillStyle, alpha, glowColor, glowBlur) {
      ctx.save();
      drawShapeGlow(`rgba(${glowColor[0]},${glowColor[1]},${glowColor[2]},0.95)`, glowBlur);
      const r = 44;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = -Math.PI / 2 + i * 2 * Math.PI / 5;
        const x = cx + Math.cos(a) * r * sx;
        const y = cy + Math.sin(a) * r * sy;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = fillStyle(alpha);
      ctx.fill();
      clearShapeGlow();
      ctx.restore();
    }

    function render() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight * 0.8;

      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;

      const role = roleSelect.value;
      const scene = getSceneParams(sceneSelect.value);

      const energyNorm = clamp(motionEnergy / 10, 0, 1.0);
      const activeBrightness = clamp(
        scene.brightnessBase + energyNorm * scene.brightnessGain,
        scene.brightnessBase,
        1.0
      );
      const inactiveBrightness = scene.inactiveBrightness;

      let tl = inactiveBrightness;
      let tr = inactiveBrightness;
      let bl = inactiveBrightness;
      let br = inactiveBrightness;

      if (role === "Piano1") tl = activeBrightness;
      if (role === "Piano2") tr = activeBrightness;
      if (role === "Perc1") bl = activeBrightness;
      if (role === "Perc2") br = activeBrightness;
      if (role === "AllForms") {
        tl = activeBrightness;
        tr = activeBrightness;
        bl = activeBrightness;
        br = activeBrightness;
      }

      ctx.clearRect(0, 0, w, h);

      if (!scene.invertMode) {
        ctx.fillStyle = "rgb(5,5,5)";
        ctx.fillRect(0, 0, w, h);

        // base colored presence per quadrant
        ctx.fillStyle = `rgba(255,120,200,${scene.baseBgMix * tl * scene.bgContrast})`;
        ctx.fillRect(0, 0, w / 2, h / 2);

        ctx.fillStyle = `rgba(120,255,120,${scene.baseBgMix * tr * scene.bgContrast})`;
        ctx.fillRect(w / 2, 0, w / 2, h / 2);

        ctx.fillStyle = `rgba(255,100,100,${scene.baseBgMix * bl * scene.bgContrast})`;
        ctx.fillRect(0, h / 2, w / 2, h / 2);

        ctx.fillStyle = `rgba(100,120,255,${scene.baseBgMix * br * scene.bgContrast})`;
        ctx.fillRect(w / 2, h / 2, w / 2, h / 2);

        drawGlow(w * 0.25, h * 0.25, [255, 120, 200], tl * scene.bgContrast, w, h, scene.glowSpread);
        drawGlow(w * 0.75, h * 0.25, [120, 255, 120], tr * scene.bgContrast, w, h, scene.glowSpread);
        drawGlow(w * 0.25, h * 0.75, [255, 100, 100], bl * scene.bgContrast, w, h, scene.glowSpread);
        drawGlow(w * 0.75, h * 0.75, [100, 120, 255], br * scene.bgContrast, w, h, scene.glowSpread);
      } else {
        const bgWhite = clamp(0.06 + energyNorm * 0.85, 0.06, 1.0);
        ctx.fillStyle = `rgba(255,255,255,${bgWhite})`;
        ctx.fillRect(0, 0, w, h);

        // slight residual color tints
        drawGlow(w * 0.25, h * 0.25, [255, 120, 200], 0.16 + tl * 0.25, w, h, scene.glowSpread);
        drawGlow(w * 0.75, h * 0.25, [120, 255, 120], 0.16 + tr * 0.25, w, h, scene.glowSpread);
        drawGlow(w * 0.25, h * 0.75, [255, 100, 100], 0.16 + bl * 0.25, w, h, scene.glowSpread);
        drawGlow(w * 0.75, h * 0.75, [100, 120, 255], 0.16 + br * 0.25, w, h, scene.glowSpread);
      }

      const sx = clamp(scene.baseSize + filteredX * scene.scaleGain, scene.baseSize, scene.maxScale);
      const sy = clamp(scene.baseSize + filteredY * scene.scaleGain, scene.baseSize, scene.maxScale);

      function whiteFill(alpha) {
        return `rgba(255,255,255,${alpha})`;
      }

      function roleFill(rgb, alpha) {
        return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`;
      }

      const p1Color = getRoleColor("Piano1");
      const p2Color = getRoleColor("Piano2");
      const pc1Color = getRoleColor("Perc1");
      const pc2Color = getRoleColor("Perc2");

      const fillP1 = scene.invertMode ? (a => roleFill(p1Color, a)) : whiteFill;
      const fillP2 = scene.invertMode ? (a => roleFill(p2Color, a)) : whiteFill;
      const fillPc1 = scene.invertMode ? (a => roleFill(pc1Color, a)) : whiteFill;
      const fillPc2 = scene.invertMode ? (a => roleFill(pc2Color, a)) : whiteFill;

      if (role === "Piano1" || role === "AllForms") {
        drawCircle(cx, cy, sx, sy, fillP1, scene.formAlpha, scene.glowColor, scene.formGlow);
      }
      if (role === "Piano2" || role === "AllForms") {
        drawPentagon(cx, cy, sx, sy, fillP2, scene.formAlpha, scene.glowColor, scene.formGlow);
      }
      if (role === "Perc1" || role === "AllForms") {
        drawTriangle(cx, cy, sx, sy, fillPc1, scene.formAlpha, scene.glowColor, scene.formGlow);
      }
      if (role === "Perc2" || role === "AllForms") {
        drawSquare(cx, cy, sx, sy, fillPc2, scene.formAlpha, scene.glowColor, scene.formGlow);
      }

      requestAnimationFrame(render);
    }

    startBtn.addEventListener("click", startMotion);
    render();
  </script>
</body>
</html>
