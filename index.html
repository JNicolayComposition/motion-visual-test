<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Motion Visual</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h2 {
      margin: 12px 0 8px;
      font-size: 22px;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding: 0 10px;
    }

    select, button {
      font-size: 17px;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
    }

    button {
      cursor: pointer;
    }

    #status {
      margin: 6px 0 10px;
      font-size: 14px;
      opacity: 0.9;
      padding: 0 12px;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 80vh;
      touch-action: none;
    }
  </style>
</head>
<body>
  <h2>Motion Visual</h2>

  <div class="controls">
    <select id="roleSelect">
      <option value="Piano1">Piano1</option>
      <option value="Piano2">Piano2</option>
      <option value="Perc1">Perc1</option>
      <option value="Perc2">Perc2</option>
      <option value="AllForms">All Forms</option>
    </select>

    <select id="modeSelect">
      <option value="tilt">Tilt Mode</option>
      <option value="impulse">Impulse Mode</option>
    </select>

    <select id="sceneSelect">
      <option value="A">Scene A: Residual</option>
      <option value="B">Scene B: Articulation</option>
      <option value="C">Scene C: Saturation</option>
      <option value="D">Scene D: Inverse</option>
    </select>

    <button id="startBtn">Enable Motion</button>
  </div>

  <div id="status">waiting...</div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const roleSelect = document.getElementById("roleSelect");
    const modeSelect = document.getElementById("modeSelect");
    const sceneSelect = document.getElementById("sceneSelect");
    const startBtn = document.getElementById("startBtn");

    let ax = 0, ay = 0, az = 0;
    let beta = 0, gamma = 0;

    let filteredX = 0;
    let filteredY = 0;
    let motionEnergy = 0;

    let sceneBlend = 0;
    let lastScene = "A";
    let sceneA = 1, sceneB = 0, sceneC = 0, sceneD = 0;

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function attackRelease(current, target, attack, release) {
      if (target > current) {
        return current * (1 - attack) + target * attack;
      } else {
        return current * (1 - release) + target * release;
      }
    }

    function mix(a, b, t) {
      return a * (1 - t) + b * t;
    }

    function mixColor(c1, c2, t) {
      return [
        Math.round(mix(c1[0], c2[0], t)),
        Math.round(mix(c1[1], c2[1], t)),
        Math.round(mix(c1[2], c2[2], t))
      ];
    }

    function getRoleColor(role) {
      if (role === "Piano1") return [255, 120, 200];
      if (role === "Piano2") return [120, 255, 120];
      if (role === "Perc1")  return [255, 100, 100];
      if (role === "Perc2")  return [100, 120, 255];
      return [255, 255, 255];
    }

    function getSceneParams(scene) {
      if (scene === "A") {
        return {
          name: "Residual",
          baseSize: 0.02,
          scaleGain: 0.26,
          maxScale: 1.8,
          brightnessBase: 0.10,
          brightnessGain: 0.10,
          inactiveBrightness: 0.03,
          attackImpulse: 0.18,
          releaseImpulse: 0.07,
          attackTilt: 0.14,
          releaseTilt: 0.08,
          energyAttack: 0.18,
          energyRelease: 0.06,
          glowSpread: 0.95,
          formAlpha: 0.60,
          formGlow: 26,
          glowColor: [255, 255, 255],
          baseBgMix: 0.14,
          bgContrast: 0.75,
          invertMode: false,
          centerBoost: 0.0,
          formDarken: 0.0
        };
      }

      if (scene === "B") {
        return {
          name: "Articulation",
          baseSize: 0.03,
          scaleGain: 0.40,
          maxScale: 2.5,
          brightnessBase: 0.16,
          brightnessGain: 0.22,
          inactiveBrightness: 0.05,
          attackImpulse: 0.88,
          releaseImpulse: 0.18,
          attackTilt: 0.65,
          releaseTilt: 0.18,
          energyAttack: 0.80,
          energyRelease: 0.14,
          glowSpread: 0.92,
          formAlpha: 1.0,
          formGlow: 10,
          glowColor: [255, 255, 255],
          baseBgMix: 0.18,
          bgContrast: 1.25,
          invertMode: false,
          centerBoost: 0.55,
          formDarken: 0.0
        };
      }

      if (scene === "C") {
        return {
          name: "Saturation",
          baseSize: 0.05,
          scaleGain: 0.62,
          maxScale: 3.5,
          brightnessBase: 0.26,
          brightnessGain: 0.36,
          inactiveBrightness: 0.10,
          attackImpulse: 0.86,
          releaseImpulse: 0.06,
          attackTilt: 0.62,
          releaseTilt: 0.08,
          energyAttack: 0.82,
          energyRelease: 0.06,
          glowSpread: 1.02,
          formAlpha: 0.96,
          formGlow: 34,
          glowColor: [255, 225, 150],
          baseBgMix: 0.30,
          bgContrast: 1.55,
          invertMode: false,
          centerBoost: 0.12,
          formDarken: 0.0
        };
      }

      return {
        name: "Inverse",
        baseSize: 0.03,
        scaleGain: 0.48,
        maxScale: 3.0,
        brightnessBase: 0.08,
        brightnessGain: 0.78,
        inactiveBrightness: 0.04,
        attackImpulse: 0.86,
        releaseImpulse: 0.06,
        attackTilt: 0.66,
        releaseTilt: 0.08,
        energyAttack: 0.82,
        energyRelease: 0.06,
        glowSpread: 1.05,
        formAlpha: 0.72,
        formGlow: 42,
        glowColor: [255, 255, 255],
        baseBgMix: 0.10,
        bgContrast: 1.15,
        invertMode: true,
        centerBoost: 0.10,
        formDarken: 0.45
      };
    }

    async function startMotion() {
      statusEl.textContent = "requesting permission...";

      try {
        const needsPermission =
          typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function";

        if (needsPermission) {
          const motionPermission = await DeviceMotionEvent.requestPermission();
          let orientationPermission = "granted";

          if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
          ) {
            orientationPermission = await DeviceOrientationEvent.requestPermission();
          }

          if (motionPermission === "granted" && orientationPermission === "granted") {
            window.addEventListener("devicemotion", handleMotion);
            window.addEventListener("deviceorientation", handleOrientation);
            statusEl.textContent = "motion ON";
          } else {
            statusEl.textContent =
              "denied: motion=" + motionPermission + ", orientation=" + orientationPermission;
          }
        } else {
          window.addEventListener("devicemotion", handleMotion);
          window.addEventListener("deviceorientation", handleOrientation);
          statusEl.textContent = "motion ON";
        }
      } catch (e) {
        statusEl.textContent = "error: " + e;
      }
    }

    function handleOrientation(e) {
      beta = e.beta || 0;
      gamma = e.gamma || 0;
    }

    function updateSceneBlend() {
      const target = sceneSelect.value;
      sceneA = attackRelease(sceneA, target === "A" ? 1 : 0, 0.12, 0.12);
      sceneB = attackRelease(sceneB, target === "B" ? 1 : 0, 0.12, 0.12);
      sceneC = attackRelease(sceneC, target === "C" ? 1 : 0, 0.12, 0.12);
      sceneD = attackRelease(sceneD, target === "D" ? 1 : 0, 0.12, 0.12);
    }

    function handleMotion(e) {
      const acc = e.accelerationIncludingGravity || e.acceleration || { x: 0, y: 0, z: 0 };

      ax = acc.x || 0;
      ay = acc.y || 0;
      az = acc.z || 0;

      const mode = modeSelect.value;
      const scene = getSceneParams(sceneSelect.value);

      let targetX = 0;
      let targetY = 0;

      if (mode === "tilt") {
        targetX = clamp(Math.abs(gamma) / 18, 0, 2.5);
        targetY = clamp(Math.abs(beta) / 22, 0, 2.5);

        filteredX = attackRelease(filteredX, targetX, scene.attackTilt, scene.releaseTilt);
        filteredY = attackRelease(filteredY, targetY, scene.attackTilt, scene.releaseTilt);
      } else {
        targetX = clamp(Math.abs(ax), 0, 10);
        targetY = clamp(Math.abs(ay), 0, 10);

        filteredX = attackRelease(filteredX, targetX, scene.attackImpulse, scene.releaseImpulse);
        filteredY = attackRelease(filteredY, targetY, scene.attackImpulse, scene.releaseImpulse);
      }

      const total = clamp(Math.abs(ax) + Math.abs(ay) + Math.abs(az - 9.81), 0, 24);
      motionEnergy = attackRelease(motionEnergy, total, scene.energyAttack, scene.energyRelease);

      statusEl.textContent =
        roleSelect.value +
        " | " + mode +
        " | Scene " + sceneSelect.value +
        " | ax:" + ax.toFixed(2) +
        " ay:" + ay.toFixed(2) +
        " beta:" + beta.toFixed(1) +
        " gamma:" + gamma.toFixed(1);
    }

    function drawGlow(cx, cy, rgb, alpha, w, h, spread) {
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * spread);
      grad.addColorStop(0, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`);
      grad.addColorStop(0.40, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha * 0.45})`);
      grad.addColorStop(1, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function drawCenterLight(alpha, w, h) {
      const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.min(w, h) * 0.42);
      grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
      grad.addColorStop(0.45, `rgba(255,255,255,${alpha * 0.25})`);
      grad.addColorStop(1, `rgba(255,255,255,0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function drawShapeGlow(glowColor, glowBlur) {
      ctx.shadowColor = `rgba(${glowColor[0]},${glowColor[1]},${glowColor[2]},0.95)`;
      ctx.shadowBlur = glowBlur;
    }

    function clearShapeGlow() {
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
    }

    function drawCircle(cx, cy, sx, sy, fillStyle, alpha, glowColor, glowBlur) {
      ctx.save();
      drawShapeGlow(glowColor, glowBlur);
      ctx.beginPath();
      ctx.ellipse(cx, cy, 48 * sx, 48 * sy, 0, 0, Math.PI * 2);
      ctx.fillStyle = fillStyle(alpha);
      ctx.fill();
      clearShapeGlow();
      ctx.restore();
    }

    function drawTriangle(cx, cy, sx, sy, fillStyle, alpha, glowColor, glowBlur) {
      ctx.save();
      drawShapeGlow(glowColor, glowBlur);
      ctx.beginPath();
      ctx.moveTo(cx, cy - 42 * sy);
      ctx.lineTo(cx - 38 * sx, cy + 32 * sy);
      ctx.lineTo(cx + 38 * sx, cy + 32 * sy);
      ctx.closePath();
      ctx.fillStyle = fillStyle(alpha);
      ctx.fill();
      clearShapeGlow();
      ctx.restore();
    }

    function drawSquare(cx, cy, sx, sy, fillStyle, alpha, glowColor, glowBlur) {
      ctx.save();
      drawShapeGlow(glowColor, glowBlur);
      const w = 76 * sx;
      const h = 76 * sy;
      ctx.fillStyle = fillStyle(alpha);
      ctx.fillRect(cx - w / 2, cy - h / 2, w, h);
      clearShapeGlow();
      ctx.restore();
    }

    function drawPentagon(cx, cy, sx, sy, fillStyle, alpha, glowColor, glowBlur) {
      ctx.save();
      drawShapeGlow(glowColor, glowBlur);
      const r = 44;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = -Math.PI / 2 + i * 2 * Math.PI / 5;
        const x = cx + Math.cos(a) * r * sx;
        const y = cy + Math.sin(a) * r * sy;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = fillStyle(alpha);
      ctx.fill();
      clearShapeGlow();
      ctx.restore();
    }

    function sceneMixedValue(a, b, c, d) {
      return a * sceneA + b * sceneB + c * sceneC + d * sceneD;
    }

    function render() {
      updateSceneBlend();

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight * 0.8;

      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;

      const role = roleSelect.value;

      const sceneAParams = getSceneParams("A");
      const sceneBParams = getSceneParams("B");
      const sceneCParams = getSceneParams("C");
      const sceneDParams = getSceneParams("D");

      const energyNorm = clamp(motionEnergy / 10, 0, 1.0);

      const brightnessBase = sceneMixedValue(
        sceneAParams.brightnessBase,
        sceneBParams.brightnessBase,
        sceneCParams.brightnessBase,
        sceneDParams.brightnessBase
      );
      const brightnessGain = sceneMixedValue(
        sceneAParams.brightnessGain,
        sceneBParams.brightnessGain,
        sceneCParams.brightnessGain,
        sceneDParams.brightnessGain
      );
      const inactiveBrightness = sceneMixedValue(
        sceneAParams.inactiveBrightness,
        sceneBParams.inactiveBrightness,
        sceneCParams.inactiveBrightness,
        sceneDParams.inactiveBrightness
      );
      const baseBgMix = sceneMixedValue(
        sceneAParams.baseBgMix,
        sceneBParams.baseBgMix,
        sceneCParams.baseBgMix,
        sceneDParams.baseBgMix
      );
      const bgContrast = sceneMixedValue(
        sceneAParams.bgContrast,
        sceneBParams.bgContrast,
        sceneCParams.bgContrast,
        sceneDParams.bgContrast
      );
      const glowSpread = sceneMixedValue(
        sceneAParams.glowSpread,
        sceneBParams.glowSpread,
        sceneCParams.glowSpread,
        sceneDParams.glowSpread
      );
      const centerBoost = sceneMixedValue(
        sceneAParams.centerBoost,
        sceneBParams.centerBoost,
        sceneCParams.centerBoost,
        sceneDParams.centerBoost
      );

      const activeBrightness = clamp(
        brightnessBase + energyNorm * brightnessGain,
        brightnessBase,
        1.0
      );

      let tl = inactiveBrightness;
      let tr = inactiveBrightness;
      let bl = inactiveBrightness;
      let br = inactiveBrightness;

      if (role === "Piano1") tl = activeBrightness;
      if (role === "Piano2") tr = activeBrightness;
      if (role === "Perc1") bl = activeBrightness;
      if (role === "Perc2") br = activeBrightness;
      if (role === "AllForms") {
        tl = activeBrightness;
        tr = activeBrightness;
        bl = activeBrightness;
        br = activeBrightness;
      }

      const invertMix = sceneD;

      ctx.clearRect(0, 0, w, h);

      // mixed background base
      const bgWhite = clamp(0.02 + invertMix * (0.10 + energyNorm * 0.75), 0.02, 0.95);
      ctx.fillStyle = `rgba(${Math.round(255 * bgWhite)},${Math.round(255 * bgWhite)},${Math.round(255 * bgWhite)},1)`;
      ctx.fillRect(0, 0, w, h);

      // softened quadrant bases
      ctx.fillStyle = `rgba(255,120,200,${baseBgMix * tl * bgContrast})`;
      ctx.fillRect(0, 0, w / 2, h / 2);

      ctx.fillStyle = `rgba(120,255,120,${baseBgMix * tr * bgContrast})`;
      ctx.fillRect(w / 2, 0, w / 2, h / 2);

      ctx.fillStyle = `rgba(255,100,100,${baseBgMix * bl * bgContrast})`;
      ctx.fillRect(0, h / 2, w / 2, h / 2);

      ctx.fillStyle = `rgba(100,120,255,${baseBgMix * br * bgContrast})`;
      ctx.fillRect(w / 2, h / 2, w / 2, h / 2);

      // always soft transitions
      drawGlow(w * 0.25, h * 0.25, [255, 120, 200], tl * bgContrast, w, h, glowSpread);
      drawGlow(w * 0.75, h * 0.25, [120, 255, 120], tr * bgContrast, w, h, glowSpread);
      drawGlow(w * 0.25, h * 0.75, [255, 100, 100], bl * bgContrast, w, h, glowSpread);
      drawGlow(w * 0.75, h * 0.75, [100, 120, 255], br * bgContrast, w, h, glowSpread);

      // articulation center flash
      if (centerBoost > 0.01) {
        drawCenterLight(centerBoost * energyNorm, w, h);
      }

      function getShapeParamsForScene(sceneKey) {
        return getSceneParams(sceneKey);
      }

      function getShapeScale(sceneKey) {
        const p = getShapeParamsForScene(sceneKey);
        return {
          sx: clamp(p.baseSize + filteredX * p.scaleGain, p.baseSize, p.maxScale),
          sy: clamp(p.baseSize + filteredY * p.scaleGain, p.baseSize, p.maxScale),
          alpha: p.formAlpha * (1 - (sceneKey === "D" ? energyNorm * 0.08 : 0)),
          glowBlur: p.formGlow,
          glowColor: p.glowColor,
          darken: p.formDarken,
          invertMode: p.invertMode
        };
      }

      function fillWhite(alpha) {
        return `rgba(255,255,255,${alpha})`;
      }

      function fillRole(rgb, alpha, darken) {
        const r = Math.round(rgb[0] * (1 - darken));
        const g = Math.round(rgb[1] * (1 - darken));
        const b = Math.round(rgb[2] * (1 - darken));
        return `rgba(${r},${g},${b},${alpha})`;
      }

      const p1Color = getRoleColor("Piano1");
      const p2Color = getRoleColor("Piano2");
      const pc1Color = getRoleColor("Perc1");
      const pc2Color = getRoleColor("Perc2");

      function drawRoleShape(roleName, sceneKey, drawFn, rgb) {
        const sp = getShapeScale(sceneKey);
        const fillFn = sp.invertMode
          ? (a) => fillRole(rgb, a, sp.darken)
          : (a) => fillWhite(a);

        drawFn(cx, cy, sp.sx, sp.sy, fillFn, sp.alpha, sp.glowColor, sp.glowBlur);
      }

      if (role === "Piano1") drawRoleShape("Piano1", sceneSelect.value, drawCircle, p1Color);
      if (role === "Piano2") drawRoleShape("Piano2", sceneSelect.value, drawPentagon, p2Color);
      if (role === "Perc1")  drawRoleShape("Perc1", sceneSelect.value, drawTriangle, pc1Color);
      if (role === "Perc2")  drawRoleShape("Perc2", sceneSelect.value, drawSquare, pc2Color);

      if (role === "AllForms") {
        drawRoleShape("Piano1", "A", drawCircle, p1Color);
        drawRoleShape("Piano2", "B", drawPentagon, p2Color);
        drawRoleShape("Perc1", "C", drawTriangle, pc1Color);
        drawRoleShape("Perc2", "D", drawSquare, pc2Color);
      }

      requestAnimationFrame(render);
    }

    startBtn.addEventListener("click", startMotion);
    render();
  </script>
</body>
</html>
