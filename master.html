<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Master Visual</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,sans-serif;
text-align:center;
overflow:hidden;
}

#topbar{
position:fixed;
top:0;
left:0;
right:0;
z-index:10;
background:rgba(0,0,0,.72);
padding-bottom:8px;
transition:opacity .5s ease, transform .5s ease;
}

#topbar.hidden{
opacity:0;
transform:translateY(-120%);
pointer-events:none;
}

h2{margin:12px 0 8px;font-size:22px}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
flex-wrap:wrap;
padding:0 10px;
}

input,button,select{
font-size:16px;
padding:10px 12px;
border:none;
border-radius:8px;
}

input{width:230px}

#status{
font-size:14px;
opacity:.9;
padding:4px 12px;
}

canvas{
display:block;
width:100vw;
height:100vh;
}
</style>
</head>

<body>

<div id="topbar">
<h2>Master Visual</h2>

<div class="controls" id="ui">
<input id="serverInput"/>
<button id="connectBtn">Connect</button>
<button id="resetBtn">Reset</button>

<select id="sceneOverride">
<option value="fromClients">Scenes from clients</option>
<option value="A">Force Scene A</option>
<option value="B">Force Scene B</option>
<option value="C">Force Scene C</option>
<option value="D">Force Scene D</option>
</select>

<button id="fullscreenBtn">Fullscreen</button>
<button id="wakeBtn">Keep Awake</button>
</div>

<div id="status">not connected</div>
</div>

<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c"),
ctx=canvas.getContext("2d"),
statusEl=document.getElementById("status"),
serverInput=document.getElementById("serverInput"),
connectBtn=document.getElementById("connectBtn"),
resetBtn=document.getElementById("resetBtn"),
sceneOverride=document.getElementById("sceneOverride"),
ui=document.getElementById("topbar");

const roles=["Piano1","Piano2","Perc1","Perc2"];
let ws=null,state={};

for(const r of roles){
state[r]={sx:0,sy:0,energy:0,tiltX:0,tiltY:0,mode:"impulse",scene:"A",source:"none",connected:false};
}

serverInput.value="wss://motion-websocket-server.onrender.com";

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

function connectWs(){
ws=new WebSocket(serverInput.value.trim());
ws.onopen=()=>statusEl.textContent="connected";
ws.onclose=()=>statusEl.textContent="disconnected";
ws.onerror=()=>statusEl.textContent="websocket error";
ws.onmessage=(ev)=>{
try{
const msg=JSON.parse(ev.data);
if(msg.type==="state"&&msg.roles){state=msg.roles;}
}catch(e){}
};
}

connectBtn.onclick=connectWs;

resetBtn.onclick=()=>{
if(ws&&ws.readyState===1){
ws.send(JSON.stringify({type:"reset"}));
}
};

document.getElementById("fullscreenBtn").onclick=()=>{
document.documentElement.requestFullscreen().catch(e=>console.log(e));
};

let wakeLock=null;
async function enableWakeLock(){
try{wakeLock=await navigator.wakeLock.request("screen");}
catch(e){console.log(e);}
}
document.getElementById("wakeBtn").onclick=enableWakeLock;
document.addEventListener("visibilitychange",()=>{
if(wakeLock!==null&&document.visibilityState==="visible")enableWakeLock();
});

let uiTimeout=null;
function showUI(){
ui.classList.remove("hidden");
if(uiTimeout)clearTimeout(uiTimeout);
uiTimeout=setTimeout(()=>ui.classList.add("hidden"),3000);
}
document.addEventListener("mousemove",showUI);
document.addEventListener("click",showUI);
showUI();

function getSceneParams(scene){
if(scene==="A")return{baseSize:.02,scaleGain:.24,maxScale:1.75,brightnessBase:.18,brightnessGain:.12,globalAmbient:.16,glowSpread:1.32,formAlpha:.58,formGlow:28,glowColor:[255,255,255],invertMode:false};
if(scene==="B")return{baseSize:.03,scaleGain:.38,maxScale:2.4,brightnessBase:.26,brightnessGain:.24,globalAmbient:.20,glowSpread:1.38,formAlpha:1,formGlow:10,glowColor:[255,255,255],invertMode:false};
if(scene==="C")return{baseSize:.05,scaleGain:.58,maxScale:3.35,brightnessBase:.52,brightnessGain:.58,globalAmbient:.42,glowSpread:1.42,formAlpha:.96,formGlow:34,glowColor:[255,225,150],invertMode:false};
return{baseSize:.03,scaleGain:.46,maxScale:3,brightnessBase:.10,brightnessGain:.72,globalAmbient:.14,glowSpread:1.40,formAlpha:.72,formGlow:42,glowColor:[255,255,255],invertMode:true};
}

function getRoleColor(role){
if(role==="Piano1")return[255,120,200];
if(role==="Piano2")return[120,255,120];
if(role==="Perc1")return[255,100,100];
return[100,120,255];
}

let rotations={Piano1:0,Piano2:0,Perc1:0,Perc2:0};

/* PARTICLES */
let particles=[];
let lastBurst={Piano1:0,Piano2:0,Perc1:0,Perc2:0};

function spawnParticles(role,scene,x,y,energy){
const rgb=getRoleColor(role);

let count=0,speedMin=.4,speedMax=2,sizeMin=1.2,sizeMax=4,life=.96,color=[255,255,255],alpha=.6,gravity=0,drag=.985,shapeType="dot";

if(scene==="A"){
count=8;speedMin=.4;speedMax=1.8;sizeMin=.8;sizeMax=2.8;life=.978;alpha=.24;color=[255,255,255];drag=.992;shapeType="dust";
}
else if(scene==="B"){
count=18;speedMin=2;speedMax=5.5;sizeMin=1.2;sizeMax=3.6;life=.945;alpha=.62;color=[255,255,255];drag=.972;shapeType="shard";
}
else if(scene==="C"){
count=42;speedMin=3;speedMax=9;sizeMin=1.5;sizeMax=5;life=.975;alpha=.72;color=[255,225,150];drag=.985;shapeType="gold";
}
else{
count=30;speedMin=1.5;speedMax=5.5;sizeMin=1.4;sizeMax=4.5;life=.982;alpha=.60;color=[Math.round(rgb[0]*.55),Math.round(rgb[1]*.55),Math.round(rgb[2]*.55)];gravity=.008;drag=.990;shapeType="darkShard";
}

count=Math.round(count*clamp(energy/8,.55,1.25));

const minDim=Math.min(canvas.width,canvas.height);
const startRadius=minDim*.18;
const startJitter=minDim*.12;

for(let i=0;i<count;i++){
const a=Math.random()*Math.PI*2;
const sp=speedMin+Math.random()*(speedMax-speedMin);
const r=startRadius+Math.random()*startJitter;
const moveAngle=a+(Math.random()-.5)*.8;

particles.push({
x:x+Math.cos(a)*r,
y:y+Math.sin(a)*r,
vx:Math.cos(moveAngle)*sp*(.65+Math.random()*.75),
vy:Math.sin(moveAngle)*sp*(.65+Math.random()*.75),
life:1,
decay:life-(Math.random()*.018),
size:sizeMin+Math.random()*(sizeMax-sizeMin),
color:color,
alpha:alpha*(.55+Math.random()*.6),
gravity:gravity*(.5+Math.random()),
drag:drag-(Math.random()*.01),
rot:Math.random()*Math.PI*2,
vr:(Math.random()-.5)*.16,
scene:scene,
shapeType:shapeType
});
}
}

function updateParticles(){
for(let i=particles.length-1;i>=0;i--){
const p=particles[i];
p.x+=p.vx;
p.y+=p.vy;
p.vy+=p.gravity;
p.vx*=p.drag;
p.vy*=p.drag;
p.rot+=p.vr;
p.vx+=Math.sin(p.y*.01+p.life*5)*.006;
p.vy+=Math.cos(p.x*.01+p.life*4)*.006;
p.life*=p.decay;
if(p.life<.025)particles.splice(i,1);
}
}

function drawParticles(){
ctx.save();
for(const p of particles){
const a=p.alpha*p.life;
ctx.globalAlpha=a;
ctx.fillStyle=`rgb(${p.color[0]},${p.color[1]},${p.color[2]})`;

if(p.shapeType==="shard"||p.shapeType==="darkShard"){
ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(p.rot);
ctx.fillRect(-p.size/2,-p.size/2,p.size*2.4,p.size*.45);
ctx.restore();
}
else{
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
}
}
ctx.restore();
ctx.globalAlpha=1;
}

function drawGlow(cx,cy,rgb,alpha,w,h,spread){
const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(w,h)*spread);
g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`);
g.addColorStop(.38,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha*.45})`);
g.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
ctx.fillStyle=g;
ctx.fillRect(0,0,w,h);
}

function shape(role,cx,cy,sx,sy,fill,glow,blur,rotation=0){
ctx.save();
ctx.translate(cx,cy);
ctx.rotate(rotation);
ctx.shadowColor=glow;
ctx.shadowBlur=blur;
ctx.fillStyle=fill;

if(role==="Piano1"){
ctx.beginPath();
ctx.ellipse(0,0,48*sx,48*sy,0,0,Math.PI*2);
ctx.fill();
}
else if(role==="Piano2"){
const r=44;
ctx.beginPath();
for(let i=0;i<5;i++){
const a=-Math.PI/2+i*2*Math.PI/5;
const x=Math.cos(a)*r*sx;
const y=Math.sin(a)*r*sy;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.fill();
}
else if(role==="Perc1"){
ctx.beginPath();
ctx.moveTo(0,-42*sy);
ctx.lineTo(-38*sx,32*sy);
ctx.lineTo(38*sx,32*sy);
ctx.closePath();
ctx.fill();
}
else{
ctx.fillRect(-38*sx,-38*sy,76*sx,76*sy);
}
ctx.restore();
}

function render(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2;

ctx.fillStyle="rgb(5,5,5)";
ctx.fillRect(0,0,w,h);

const forced=sceneOverride.value;

let amb=.1,spread=1.32;

for(const r of roles){
const sc=getSceneParams(forced==="fromClients"?(state[r]?.scene||"A"):forced);
amb=Math.max(amb,sc.globalAmbient*.65);
spread=Math.max(spread,sc.glowSpread);
}

const bright={};

for(const r of roles){
const st=state[r]||{};
const scn=forced==="fromClients"?(st.scene||"A"):forced;
const sc=getSceneParams(scn);
const e=clamp((st.energy||0)/10,0,1);
bright[r]=clamp(sc.brightnessBase+e*sc.brightnessGain,sc.brightnessBase,1);
}

drawGlow(w*.25,h*.25,[255,120,200],Math.max(amb,bright.Piano1||0),w,h,spread);
drawGlow(w*.75,h*.25,[120,255,120],Math.max(amb,bright.Piano2||0),w,h,spread);
drawGlow(w*.25,h*.75,[255,100,100],Math.max(amb,bright.Perc1||0),w,h,spread);
drawGlow(w*.75,h*.75,[100,120,255],Math.max(amb,bright.Perc2||0),w,h,spread);

updateParticles();
drawParticles();

for(const r of roles){
const st=state[r]||{};
const scn=forced==="fromClients"?(st.scene||"A"):forced;
const sc=getSceneParams(scn);
const e=clamp((st.energy||0)/10,0,1);

const sx=clamp(sc.baseSize+(st.sx||0)*sc.scaleGain,sc.baseSize,sc.maxScale);
const sy=clamp(sc.baseSize+(st.sy||0)*sc.scaleGain,sc.baseSize,sc.maxScale);

const rgb=getRoleColor(r);

const fill=sc.invertMode
?`rgba(${Math.round(rgb[0]*.55)},${Math.round(rgb[1]*.55)},${Math.round(rgb[2]*.55)},${sc.formAlpha})`
:`rgba(255,255,255,${sc.formAlpha})`;

const glow=`rgba(${sc.glowColor[0]},${sc.glowColor[1]},${sc.glowColor[2]},.95)`;
const blur=sc.formGlow+(st.sx||0)*8+(st.sy||0)*8+e*(scn==="B"?24:12);

let drawX=cx;
let drawY=cy;
let rotation=0;

const tiltX=clamp((st.tiltX||0)/45,-1,1);
const tiltY=clamp((st.tiltY||0)/45,-1,1);

if((st.mode||"impulse")==="tilt"){
if(scn==="A"){
const tiltAmount=Math.sqrt(tiltX*tiltX+tiltY*tiltY);
const dir=tiltX>=0?1:-1;
rotations[r]+=dir*(.005+tiltAmount*.08);
rotation=rotations[r];
}

if(scn==="C"){
const edgeReach=.48;
drawX=cx+tiltX*w*edgeReach;
drawY=cy+tiltY*h*edgeReach;
}
}

const now=Date.now();
const threshold=scn==="A"?10.5:scn==="B"?7.5:scn==="C"?7.0:7.2;
const cooldown=scn==="A"?1800:scn==="B"?900:scn==="C"?1100:1300;

if((st.energy||0)>threshold && now-lastBurst[r]>cooldown && Math.random()>.18){
spawnParticles(r,scn,drawX,drawY,st.energy||0);
lastBurst[r]=now;
}

shape(r,drawX,drawY,sx,sy,fill,glow,blur,rotation);
}

statusEl.textContent=roles.map(r=>`${r}:${state[r]?.connected?"on":"off"} ${state[r]?.source||"none"}`).join(" | ");

requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
