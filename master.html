<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Master Visual</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif;text-align:center;overflow:hidden}
h2{margin:12px 0 8px;font-size:22px}

/* UI */
.controls{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
padding:0 10px;
transition:opacity 0.5s ease;
}

.controls.hidden{
opacity:0;
pointer-events:none;
}

input,button,select{
font-size:16px;
padding:10px 12px;
border:none;
border-radius:8px
}

input{width:230px}

#status{
margin:6px 0 10px;
font-size:14px;
opacity:.9;
padding:0 12px
}

canvas{
display:block;
width:100vw;
height:82vh
}
</style>
</head>

<body>

<h2>Master Visual</h2>

<div class="controls" id="ui">

<input id="serverInput"/>
<button id="connectBtn">Connect</button>
<button id="resetBtn">Reset</button>

<select id="sceneOverride">
<option value="fromClients">Scenes from clients</option>
<option value="A">Force Scene A</option>
<option value="B">Force Scene B</option>
<option value="C">Force Scene C</option>
<option value="D">Force Scene D</option>
</select>

<!-- NEU -->
<button id="fullscreenBtn">Fullscreen</button>
<button id="wakeBtn">Keep Awake</button>

</div>

<div id="status">not connected</div>
<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c"),
ctx=canvas.getContext("2d"),
statusEl=document.getElementById("status"),
serverInput=document.getElementById("serverInput"),
connectBtn=document.getElementById("connectBtn"),
resetBtn=document.getElementById("resetBtn"),
sceneOverride=document.getElementById("sceneOverride"),
ui=document.getElementById("ui");

const roles=["Piano1","Piano2","Perc1","Perc2"];

let ws=null,state={};

for(const r of roles){
state[r]={sx:0,sy:0,energy:0,mode:"impulse",scene:"A",source:"none",connected:false}
}

/* ======================
   DEFAULT SERVER
====================== */
serverInput.value="wss://motion-websocket-server.onrender.com";

/* ======================
   CONNECT
====================== */
function connectWs(){
ws=new WebSocket(serverInput.value.trim());

ws.onopen=()=>statusEl.textContent="connected";
ws.onclose=()=>statusEl.textContent="disconnected";
ws.onerror=()=>statusEl.textContent="websocket error";

ws.onmessage=(ev)=>{
try{
const msg=JSON.parse(ev.data);
if(msg.type==="state"&&msg.roles){
state=msg.roles;
}
}catch(e){}
}
}

connectBtn.onclick=connectWs;

resetBtn.onclick=()=>{
if(ws&&ws.readyState===1){
ws.send(JSON.stringify({type:"reset"}));
}
};

/* ======================
   FULLSCREEN
====================== */
document.getElementById("fullscreenBtn").onclick=()=>{
document.documentElement.requestFullscreen().catch(e=>console.log(e));
};

/* ======================
   WAKE LOCK
====================== */
let wakeLock=null;

async function enableWakeLock(){
try{
wakeLock=await navigator.wakeLock.request("screen");
console.log("Wake lock active");
}catch(e){
console.log(e);
}
}

document.getElementById("wakeBtn").onclick=enableWakeLock;

document.addEventListener("visibilitychange",()=>{
if(wakeLock!==null && document.visibilityState==="visible"){
enableWakeLock();
}
});

/* ======================
   AUTO HIDE UI
====================== */
let uiTimeout=null;

function showUI(){
ui.classList.remove("hidden");

if(uiTimeout) clearTimeout(uiTimeout);

uiTimeout=setTimeout(()=>{
ui.classList.add("hidden");
},3000);
}

document.addEventListener("mousemove",showUI);
document.addEventListener("click",showUI);

showUI();

/* ======================
   HELPERS
====================== */
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

/* ======================
   SCENE PARAMS
====================== */
function getSceneParams(scene){
if(scene==="A")return{baseSize:.02,scaleGain:.24,maxScale:1.75,brightnessBase:.18,brightnessGain:.12,globalAmbient:.16,glowSpread:1.32,formAlpha:.58,formGlow:28,glowColor:[255,255,255],invertMode:false};
if(scene==="B")return{baseSize:.03,scaleGain:.38,maxScale:2.4,brightnessBase:.26,brightnessGain:.24,globalAmbient:.20,glowSpread:1.38,formAlpha:1,formGlow:10,glowColor:[255,255,255],invertMode:false};
if(scene==="C")return{baseSize:.05,scaleGain:.58,maxScale:3.35,brightnessBase:.52,brightnessGain:.58,globalAmbient:.42,glowSpread:1.42,formAlpha:.96,formGlow:34,glowColor:[255,225,150],invertMode:false};
return{baseSize:.03,scaleGain:.46,maxScale:3,brightnessBase:.10,brightnessGain:.72,globalAmbient:.14,glowSpread:1.40,formAlpha:.72,formGlow:42,glowColor:[255,255,255],invertMode:true};
}

function getRoleColor(role){
if(role==="Piano1")return[255,120,200];
if(role==="Piano2")return[120,255,120];
if(role==="Perc1")return[255,100,100];
return[100,120,255];
}

/* ======================
   DRAW
====================== */
function drawGlow(cx,cy,rgb,alpha,w,h,spread){
const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(w,h)*spread);
g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`);
g.addColorStop(.38,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha*.45})`);
g.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
ctx.fillStyle=g;
ctx.fillRect(0,0,w,h);
}

function shape(role,cx,cy,sx,sy,fill,glow,blur){
ctx.save();
ctx.shadowColor=glow;
ctx.shadowBlur=blur;
ctx.fillStyle=fill;

if(role==="Piano1"){
ctx.beginPath();
ctx.ellipse(cx,cy,48*sx,48*sy,0,0,Math.PI*2);
ctx.fill();
}
else if(role==="Piano2"){
const r=44;
ctx.beginPath();
for(let i=0;i<5;i++){
const a=-Math.PI/2+i*2*Math.PI/5;
const x=cx+Math.cos(a)*r*sx;
const y=cy+Math.sin(a)*r*sy;
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.fill();
}
else if(role==="Perc1"){
ctx.beginPath();
ctx.moveTo(cx,cy-42*sy);
ctx.lineTo(cx-38*sx,cy+32*sy);
ctx.lineTo(cx+38*sx,cy+32*sy);
ctx.closePath();
ctx.fill();
}
else{
ctx.fillRect(cx-38*sx,cy-38*sy,76*sx,76*sy);
}

ctx.restore();
}

/* ======================
   RENDER
====================== */
function render(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight*.82;

const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2;

ctx.fillStyle="rgb(5,5,5)";
ctx.fillRect(0,0,w,h);

const forced=sceneOverride.value;

let amb=.1,spread=1.32;

for(const r of roles){
const sc=getSceneParams(forced==="fromClients"?(state[r]?.scene||"A"):forced);
amb=Math.max(amb,sc.globalAmbient*.65);
spread=Math.max(spread,sc.glowSpread);
}

const bright={};

for(const r of roles){
const st=state[r]||{};
const sc=getSceneParams(forced==="fromClients"?(st.scene||"A"):forced);
const e=clamp((st.energy||0)/10,0,1);

bright[r]=clamp(sc.brightnessBase+e*sc.brightnessGain,sc.brightnessBase,1);
}

drawGlow(w*.25,h*.25,[255,120,200],Math.max(amb,bright.Piano1||0),w,h,spread);
drawGlow(w*.75,h*.25,[120,255,120],Math.max(amb,bright.Piano2||0),w,h,spread);
drawGlow(w*.25,h*.75,[255,100,100],Math.max(amb,bright.Perc1||0),w,h,spread);
drawGlow(w*.75,h*.75,[100,120,255],Math.max(amb,bright.Perc2||0),w,h,spread);

for(const r of roles){

const st=state[r]||{};
const scn=forced==="fromClients"?(st.scene||"A"):forced;
const sc=getSceneParams(scn);

const e=clamp((st.energy||0)/10,0,1);

const sx=clamp(sc.baseSize+(st.sx||0)*sc.scaleGain,sc.baseSize,sc.maxScale);
const sy=clamp(sc.baseSize+(st.sy||0)*sc.scaleGain,sc.baseSize,sc.maxScale);

const rgb=getRoleColor(r);

const fill=sc.invertMode
?`rgba(${Math.round(rgb[0]*.55)},${Math.round(rgb[1]*.55)},${Math.round(rgb[2]*.55)},${sc.formAlpha})`
:`rgba(255,255,255,${sc.formAlpha})`;

const glow=`rgba(${sc.glowColor[0]},${sc.glowColor[1]},${sc.glowColor[2]},.95)`;

const blur=sc.formGlow+(st.sx||0)*8+(st.sy||0)*8+e*(scn==="B"?24:12);

shape(r,cx,cy,sx,sy,fill,glow,blur);
}

statusEl.textContent=roles.map(r=>`${r}:${state[r]?.connected?"on":"off"} ${state[r]?.source||"none"}`).join(" | ");

requestAnimationFrame(render);
}

render();

</script>
</body>
</html>
