<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Master Visual - Low Latency Spatial</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif;text-align:center;overflow:hidden}
#topbar{position:fixed;top:0;left:0;right:0;z-index:10;background:rgba(0,0,0,.72);padding-bottom:8px;transition:opacity .5s ease,transform .5s ease}
#topbar.hidden{opacity:0;transform:translateY(-120%);pointer-events:none}
h2{margin:12px 0 8px;font-size:22px}
.controls{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;padding:0 10px}
input,button,select{font-size:16px;padding:10px 12px;border:none;border-radius:8px}
input{width:230px}
#status{font-size:14px;opacity:.9;padding:4px 12px}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>

<body>
<div id="topbar">
<h2>Master Visual</h2>
<div class="controls" id="ui">
<input id="serverInput"/>
<button id="connectBtn">Connect</button>
<button id="resetBtn">Reset</button>
<select id="sceneOverride">
<option value="fromClients">Scenes from clients</option>
<option value="A">Force Scene A</option>
<option value="B">Force Scene B</option>
<option value="C">Force Scene C</option>
<option value="D">Force Scene D</option>
</select>
<button id="fullscreenBtn">Fullscreen</button>
<button id="wakeBtn">Keep Awake</button>
</div>
<div id="status">not connected</div>
</div>

<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c"),
ctx=canvas.getContext("2d"),
statusEl=document.getElementById("status"),
serverInput=document.getElementById("serverInput"),
connectBtn=document.getElementById("connectBtn"),
resetBtn=document.getElementById("resetBtn"),
sceneOverride=document.getElementById("sceneOverride"),
ui=document.getElementById("topbar");

const roles=["Piano1","Piano2","Perc1","Perc2"];
let ws=null,state={};

const SMOOTH_PROFILE={
  interpMs:70,          // fills gaps between incoming websocket chunks
  staleAfterMs:85,      // after this, gesture peaks start falling quickly
  gestureDecayMs:150,   // sx/sy peak decay; lower = less "stuck" maxima
  energyDecayMs:95,     // energy peak decay; lower = shorter flashes
  maxParticles:520
};

let dpr=1;
function resizeCanvas(){
  dpr=Math.min(window.devicePixelRatio||1,1.65);
  const w=Math.floor(window.innerWidth*dpr);
  const h=Math.floor(window.innerHeight*dpr);
  if(canvas.width!==w||canvas.height!==h){
    canvas.width=w;
    canvas.height=h;
    canvas.style.width=window.innerWidth+"px";
    canvas.style.height=window.innerHeight+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
}
window.addEventListener("resize",resizeCanvas,{passive:true});
resizeCanvas();

for(const r of roles){
state[r]={sx:0,sy:0,energy:0,tiltX:0,tiltY:0,mode:"impulse",scene:"A",source:"none",connected:false};
}

let inputBuffer={};
for(const r of roles){
inputBuffer[r]={
  prev:{...state[r]},
  target:{...state[r]},
  start:performance.now(),
  lastUpdate:performance.now()
};
}

function mix(a,b,t){return a+(b-a)*t}
function smoothstep(t){return t*t*(3-2*t)}
function numberOr(v,fallback=0){return Number.isFinite(+v)?+v:fallback}

function sampleRole(role,now=performance.now()){
  const b=inputBuffer[role];
  const rawT=clamp((now-b.start)/SMOOTH_PROFILE.interpMs,0,1);
  const t=smoothstep(rawT);
  const prev=b.prev,target=b.target;
  const age=now-b.lastUpdate;
  const hold=Math.max(0,age-SMOOTH_PROFILE.staleAfterMs);
  const gestureFresh=Math.exp(-hold/SMOOTH_PROFILE.gestureDecayMs);
  const energyFresh=Math.exp(-hold/SMOOTH_PROFILE.energyDecayMs);

  return {
    sx:mix(numberOr(prev.sx),numberOr(target.sx),t)*gestureFresh,
    sy:mix(numberOr(prev.sy),numberOr(target.sy),t)*gestureFresh,
    energy:mix(numberOr(prev.energy),numberOr(target.energy),t)*energyFresh,
    tiltX:mix(numberOr(prev.tiltX),numberOr(target.tiltX),t),
    tiltY:mix(numberOr(prev.tiltY),numberOr(target.tiltY),t),
    mode:target.mode||"impulse",
    scene:target.scene||"A",
    source:target.source||"none",
    connected:!!target.connected
  };
}

function updateRoleInput(role,next){
  const now=performance.now();
  inputBuffer[role].prev=sampleRole(role,now);
  inputBuffer[role].target={...state[role],...(next||{})};
  inputBuffer[role].start=now;
  inputBuffer[role].lastUpdate=now;
  state[role]=inputBuffer[role].target;
}

let visual={};
for(const r of roles){
visual[r]={sx:0,sy:0,energy:0,x:0,y:0,vx:0,vy:0,ready:true,initialized:false};
}

serverInput.value="wss://motion-websocket-server.onrender.com";

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function lerp(a,b,t){return a+(b-a)*t}

function connectWs(){
ws=new WebSocket(serverInput.value.trim());
ws.onopen=()=>statusEl.textContent="connected";
ws.onclose=()=>statusEl.textContent="disconnected";
ws.onerror=()=>statusEl.textContent="websocket error";
ws.onmessage=(ev)=>{
try{
const msg=JSON.parse(ev.data);
if(msg.type==="state"&&msg.roles){
  for(const r of roles){
    if(msg.roles[r]) updateRoleInput(r,msg.roles[r]);
  }
}
}catch(e){}
};
}

connectBtn.onclick=connectWs;
resetBtn.onclick=()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"reset"}))};

document.getElementById("fullscreenBtn").onclick=()=>{
document.documentElement.requestFullscreen().catch(e=>console.log(e));
};

let wakeLock=null;
async function enableWakeLock(){
try{wakeLock=await navigator.wakeLock.request("screen");}catch(e){console.log(e)}
}
document.getElementById("wakeBtn").onclick=enableWakeLock;
document.addEventListener("visibilitychange",()=>{if(wakeLock!==null&&document.visibilityState==="visible")enableWakeLock()});

let uiTimeout=null;
function showUI(){
ui.classList.remove("hidden");
if(uiTimeout)clearTimeout(uiTimeout);
uiTimeout=setTimeout(()=>ui.classList.add("hidden"),3000);
}
document.addEventListener("mousemove",showUI);
document.addEventListener("click",showUI);
showUI();

function getSceneParams(scene){
if(scene==="A")return{baseSize:.02,scaleGain:.24,maxScale:1.75,brightnessBase:.18,brightnessGain:.12,globalAmbient:.16,glowSpread:1.32,formAlpha:.58,formGlow:28,glowColor:[255,255,255],invertMode:false};
if(scene==="B")return{baseSize:.03,scaleGain:.76,maxScale:4.8,brightnessBase:.26,brightnessGain:.24,globalAmbient:.20,glowSpread:1.38,formAlpha:1,formGlow:16,glowColor:[255,255,255],invertMode:false};
if(scene==="C")return{baseSize:.05,scaleGain:1.16,maxScale:6.7,brightnessBase:.52,brightnessGain:.58,globalAmbient:.42,glowSpread:1.42,formAlpha:.96,formGlow:34,glowColor:[255,225,150],invertMode:false};
return{baseSize:.03,scaleGain:.46,maxScale:3,brightnessBase:.10,brightnessGain:.72,globalAmbient:.14,glowSpread:1.40,formAlpha:.72,formGlow:42,glowColor:[255,255,255],invertMode:true};
}

function getRoleColor(role){
if(role==="Piano1")return[255,120,200];
if(role==="Piano2")return[120,255,120];
if(role==="Perc1")return[255,100,100];
return[100,120,255];
}

function getRoleDirection(role){
if(role==="Piano1")return[-1,-1];
if(role==="Piano2")return[1,-1];
if(role==="Perc1")return[-1,1];
return[1,1];
}

function getRoleQuadrantPoint(role,w,h){
// Scene D / inverse: each ensemble role lives in its own screen quadrant.
// Keep this conservative so Scene D keeps its current size logic but is no longer center-stacked.
if(role==="Piano1")return{x:w*.28,y:h*.28};
if(role==="Piano2")return{x:w*.72,y:h*.28};
if(role==="Perc1")return{x:w*.28,y:h*.72};
return{x:w*.72,y:h*.72};
}

let rotations={Piano1:0,Piano2:0,Perc1:0,Perc2:0};
let particles=[];
let lastBurst={Piano1:0,Piano2:0,Perc1:0,Perc2:0};

function spawnParticles(role,scene,x,y,energy){
if(scene==="B")return;

const rgb=getRoleColor(role);
let count=scene==="C"?42:28;
let color=scene==="C"?[255,225,150]:[Math.round(rgb[0]*.55),Math.round(rgb[1]*.55),Math.round(rgb[2]*.55)];
let speedMin=scene==="C"?3.2:1.6;
let speedMax=scene==="C"?9.0:5.2;
let life=scene==="C"?.976:.982;
let alpha=scene==="C"?.70:.60;
let drag=scene==="C"?.985:.99;
let gravity=scene==="D"?.008:0;
let shapeType=scene==="D"?"darkShard":"gold";

const minDim=Math.min(canvas.width,canvas.height);
const startRadius=minDim*.22;
const startJitter=minDim*.16;

count=Math.round(count*clamp(energy/8,.55,1.15));

for(let i=0;i<count;i++){
const a=Math.random()*Math.PI*2;
const sp=speedMin+Math.random()*(speedMax-speedMin);
const r=startRadius+Math.random()*startJitter;
const moveAngle=a+(Math.random()-.5)*.9;

if(particles.length>SMOOTH_PROFILE.maxParticles)particles.splice(0,particles.length-SMOOTH_PROFILE.maxParticles);
particles.push({
x:x+Math.cos(a)*r,
y:y+Math.sin(a)*r,
vx:Math.cos(moveAngle)*sp*(.55+Math.random()*.8),
vy:Math.sin(moveAngle)*sp*(.55+Math.random()*.8),
life:1,
decay:life-(Math.random()*.02),
size:1.4+Math.random()*4.5,
color:color,
alpha:alpha*(.45+Math.random()*.65),
gravity:gravity*(.5+Math.random()),
drag:drag-(Math.random()*.012),
rot:Math.random()*Math.PI*2,
vr:(Math.random()-.5)*.16,
shapeType:shapeType
});
}
}

function updateParticles(){
for(let i=particles.length-1;i>=0;i--){
const p=particles[i];
p.x+=p.vx;
p.y+=p.vy;
p.vy+=p.gravity;
p.vx*=p.drag;
p.vy*=p.drag;
p.rot+=p.vr;
p.vx+=Math.sin(p.y*.01+p.life*5)*.006;
p.vy+=Math.cos(p.x*.01+p.life*4)*.006;
p.life*=p.decay;
if(p.life<.025)particles.splice(i,1);
}
}

function drawParticles(){
ctx.save();
for(const p of particles){
ctx.globalAlpha=p.alpha*p.life;
ctx.fillStyle=`rgb(${p.color[0]},${p.color[1]},${p.color[2]})`;

if(p.shapeType==="darkShard"){
ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(p.rot);
ctx.fillRect(-p.size/2,-p.size/2,p.size*2.4,p.size*.45);
ctx.restore();
}else{
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
}
}
ctx.restore();
ctx.globalAlpha=1;
}

function drawGlow(cx,cy,rgb,alpha,w,h,spread){
const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(w,h)*spread);
g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`);
g.addColorStop(.38,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha*.45})`);
g.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
ctx.fillStyle=g;
ctx.fillRect(0,0,w,h);
}

function drawPath(role,sx,sy){
if(role==="Piano1"){
ctx.beginPath();
ctx.ellipse(0,0,48*sx,48*sy,0,0,Math.PI*2);
ctx.fill();
}
else if(role==="Piano2"){
const r=44;
ctx.beginPath();
for(let i=0;i<5;i++){
const a=-Math.PI/2+i*2*Math.PI/5;
const x=Math.cos(a)*r*sx;
const y=Math.sin(a)*r*sy;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.fill();
}
else if(role==="Perc1"){
ctx.beginPath();
ctx.moveTo(0,-42*sy);
ctx.lineTo(-38*sx,32*sy);
ctx.lineTo(38*sx,32*sy);
ctx.closePath();
ctx.fill();
}
else{
ctx.fillRect(-38*sx,-38*sy,76*sx,76*sy);
}
}

function strokePath(role,sx,sy){
if(role==="Piano1"){
ctx.beginPath();
ctx.ellipse(0,0,48*sx,48*sy,0,0,Math.PI*2);
ctx.stroke();
}
else if(role==="Piano2"){
const r=44;
ctx.beginPath();
for(let i=0;i<5;i++){
const a=-Math.PI/2+i*2*Math.PI/5;
const x=Math.cos(a)*r*sx;
const y=Math.sin(a)*r*sy;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.stroke();
}
else if(role==="Perc1"){
ctx.beginPath();
ctx.moveTo(0,-42*sy);
ctx.lineTo(-38*sx,32*sy);
ctx.lineTo(38*sx,32*sy);
ctx.closePath();
ctx.stroke();
}
else{
ctx.strokeRect(-38*sx,-38*sy,76*sx,76*sy);
}
}

function shape(role,cx,cy,sx,sy,fill,glow,blur,rotation=0,is3D=false){
ctx.save();
ctx.translate(cx,cy);
ctx.rotate(rotation);

if(is3D){
ctx.save();
ctx.translate(7,-7);
ctx.fillStyle="rgba(120,140,180,0.22)";
drawPath(role,sx*1.01,sy*1.01);
ctx.restore();

ctx.save();
ctx.translate(-5,5);
ctx.fillStyle="rgba(255,255,255,0.16)";
drawPath(role,sx*0.96,sy*0.96);
ctx.restore();
}

ctx.shadowColor=glow;
ctx.shadowBlur=blur;
ctx.fillStyle=fill;
drawPath(role,sx,sy);

if(is3D){
ctx.save();
ctx.globalAlpha=.35;
ctx.translate(-10,-12);
ctx.scale(.72,.72);
ctx.fillStyle="rgba(255,255,255,.38)";
drawPath(role,sx,sy);
ctx.restore();

ctx.lineWidth=1.2;
ctx.strokeStyle="rgba(255,255,255,.35)";
strokePath(role,sx,sy);
}

ctx.restore();
}

function smoothValue(current,target,attackMs,releaseMs,dtMs){
const tau=target>current?attackMs:releaseMs;
const a=1-Math.exp(-dtMs/Math.max(1,tau));
return current+(target-current)*a;
}

let lastFrame=performance.now();
let lastStatusUpdate=0;

function render(now=performance.now()){
const dtMs=Math.min(50,now-lastFrame);
lastFrame=now;

const w=window.innerWidth,h=window.innerHeight,cx=w/2,cy=h/2;
ctx.setTransform(dpr,0,0,dpr,0,0);
ctx.fillStyle="rgb(5,5,5)";
ctx.fillRect(0,0,w,h);

const forced=sceneOverride.value;
let amb=.1,spread=1.32;

for(const r of roles){
const st=sampleRole(r,now);
const sc=getSceneParams(forced==="fromClients"?(st.scene||"A"):forced);
amb=Math.max(amb,sc.globalAmbient*.65);
spread=Math.max(spread,sc.glowSpread);
}

let bright={};

for(const r of roles){
const st=sampleRole(r,now);
const scn=forced==="fromClients"?(st.scene||"A"):forced;
const sc=getSceneParams(scn);
const e=clamp((st.energy||0)/10,0,1);
bright[r]=clamp(sc.brightnessBase+e*sc.brightnessGain,sc.brightnessBase,1);
}

drawGlow(w*.25,h*.25,[255,120,200],Math.max(amb,bright.Piano1||0),w,h,spread);
drawGlow(w*.75,h*.25,[120,255,120],Math.max(amb,bright.Piano2||0),w,h,spread);
drawGlow(w*.25,h*.75,[255,100,100],Math.max(amb,bright.Perc1||0),w,h,spread);
drawGlow(w*.75,h*.75,[100,120,255],Math.max(amb,bright.Perc2||0),w,h,spread);

updateParticles();
drawParticles();

for(const r of roles){
const st=sampleRole(r,now);
const scn=forced==="fromClients"?(st.scene||"A"):forced;
const sc=getSceneParams(scn);

const targetSx=st.sx||0;
const targetSy=st.sy||0;
const targetEnergy=st.energy||0;

const attackMs=scn==="A"?34:scn==="B"?18:scn==="C"?22:24;
const releaseMs=scn==="A"?95:scn==="B"?70:scn==="C"?82:78;

visual[r].sx=smoothValue(visual[r].sx,targetSx,attackMs,releaseMs,dtMs);
visual[r].sy=smoothValue(visual[r].sy,targetSy,attackMs,releaseMs,dtMs);
visual[r].energy=smoothValue(visual[r].energy,targetEnergy,18,72,dtMs);

const e=clamp(visual[r].energy/10,0,1);

const sx=clamp(sc.baseSize+visual[r].sx*sc.scaleGain,sc.baseSize,sc.maxScale);
const sy=clamp(sc.baseSize+visual[r].sy*sc.scaleGain,sc.baseSize,sc.maxScale);

const rgb=getRoleColor(r);

const fill=sc.invertMode
?`rgba(${Math.round(rgb[0]*.55)},${Math.round(rgb[1]*.55)},${Math.round(rgb[2]*.55)},${sc.formAlpha})`
:`rgba(255,255,255,${sc.formAlpha})`;

const glow=`rgba(${sc.glowColor[0]},${sc.glowColor[1]},${sc.glowColor[2]},.95)`;
const blur=sc.formGlow+visual[r].sx*8+visual[r].sy*8+e*(scn==="B"?28:12);

let drawX=cx;
let drawY=cy;
let rotation=0;

const tiltX=clamp((st.tiltX||0)/45,-1,1);
const tiltY=clamp((st.tiltY||0)/45,-1,1);

if(scn==="D"){
const home=getRoleQuadrantPoint(r,w,h);
const driftX=tiltX*w*.055;
const driftY=tiltY*h*.055;
const targetX=home.x+driftX;
const targetY=home.y+driftY;
if(!visual[r].initialized){
visual[r].x=targetX;
visual[r].y=targetY;
visual[r].vx=0;
visual[r].vy=0;
visual[r].initialized=true;
}
visual[r].x=lerp(visual[r].x,targetX,.22);
visual[r].y=lerp(visual[r].y,targetY,.22);
drawX=visual[r].x;
drawY=visual[r].y;
}
else if((st.mode||"impulse")==="tilt"){
if(scn==="A"){
const tiltAmount=Math.sqrt(tiltX*tiltX+tiltY*tiltY);
const dir=tiltX>=0?1:-1;
rotations[r]+=dir*(.004+tiltAmount*.07);
rotation=rotations[r];
}

if(scn==="C"){
const dir=getRoleDirection(r);
const projection=clamp((tiltX*dir[0]+tiltY*dir[1])/2,0,1);
const bounceTarget=projection*.34;

const targetX=cx+dir[0]*w*bounceTarget;
const targetY=cy+dir[1]*h*bounceTarget;

if(!visual[r].initialized){
visual[r].x=cx;
visual[r].y=cy;
visual[r].vx=0;
visual[r].vy=0;
visual[r].initialized=true;
}

visual[r].vx+=(targetX-visual[r].x)*.075;
visual[r].vy+=(targetY-visual[r].y)*.075;
visual[r].vx*=.84;
visual[r].vy*=.84;
visual[r].x+=visual[r].vx;
visual[r].y+=visual[r].vy;

drawX=visual[r].x;
drawY=visual[r].y;
}else{
visual[r].x=lerp(visual[r].x||cx,cx,.06);
visual[r].y=lerp(visual[r].y||cy,cy,.06);
}
}else{
visual[r].x=lerp(visual[r].x||cx,cx,.06);
visual[r].y=lerp(visual[r].y||cy,cy,.06);
}

const scaleNorm=Math.max(sx/sc.maxScale,sy/sc.maxScale);
if(scaleNorm<.58)visual[r].ready=true;

const nowMs=Date.now();
const cooldown=scn==="C"?900:scn==="D"?1100:99999;

if((scn==="C"||scn==="D")&&scaleNorm>.92&&visual[r].ready&&nowMs-lastBurst[r]>cooldown){
spawnParticles(r,scn,drawX,drawY,visual[r].energy||0);
lastBurst[r]=nowMs;
visual[r].ready=false;
}

shape(r,drawX,drawY,sx,sy,fill,glow,blur,rotation,scn==="B");
}

if(now-lastStatusUpdate>250){
  statusEl.textContent=roles.map(r=>{
    const st=sampleRole(r,now);
    return `${r}:${st.connected?"on":"off"} ${st.source||"none"}`;
  }).join(" | ");
  lastStatusUpdate=now;
}
requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
