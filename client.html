<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Motion Client</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif;text-align:center;overflow:hidden}
h2{margin:12px 0 8px;font-size:22px}
.controls{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;padding:0 10px}
select,button,input{font-size:16px;padding:10px 12px;border:none;border-radius:8px}
input{width:230px}
#status{margin:6px 0 10px;font-size:14px;opacity:.9;padding:0 12px}
canvas{display:block;width:100vw;height:76vh;touch-action:none}
</style>
</head>

<body>

<h2>Motion Client</h2>

<div class="controls">
<select id="roleSelect">
<option value="Piano1">Piano1</option>
<option value="Piano2">Piano2</option>
<option value="Perc1">Perc1</option>
<option value="Perc2">Perc2</option>
</select>

<select id="modeSelect">
<option value="tilt">Tilt Mode</option>
<option value="impulse">Impulse Mode</option>
</select>

<select id="sceneSelect">
<option value="A">Scene A: Residual</option>
<option value="B">Scene B: Articulation</option>
<option value="C">Scene C: Saturation</option>
<option value="D">Scene D: Inverse</option>
</select>

<input id="serverInput" />
<button id="connectBtn">Connect</button>
<button id="startBtn">Enable Motion</button>
<button id="fullscreenBtn">Fullscreen</button>
<button id="wakeBtn">Keep Awake</button>
</div>

<div id="status">not connected</div>
<canvas id="c"></canvas>

<script>

let lastSendTime = 0;
const SEND_INTERVAL_MS = 60; // ca. 16 Hz

const canvas=document.getElementById("c"),ctx=canvas.getContext("2d"),statusEl=document.getElementById("status");
const roleSelect=document.getElementById("roleSelect"),modeSelect=document.getElementById("modeSelect"),sceneSelect=document.getElementById("sceneSelect");
const startBtn=document.getElementById("startBtn"),connectBtn=document.getElementById("connectBtn"),serverInput=document.getElementById("serverInput");

let ws=null,connected=false,ax=0,ay=0,az=0,beta=0,gamma=0,filteredX=0,filteredY=0,motionEnergy=0;
let touchMode=false,lastTouchX=null,lastTouchY=null;

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function attackRelease(c,t,a,r){return t>c?c*(1-a)+t*a:c*(1-r)+t*r}

serverInput.value="wss://motion-websocket-server.onrender.com";

function connectWs(){
ws=new WebSocket(serverInput.value.trim());
ws.onopen=()=>{connected=true;statusEl.textContent="connected"};
ws.onclose=()=>{connected=false;statusEl.textContent="disconnected"};
ws.onerror=()=>{statusEl.textContent="websocket error"};
}
connectBtn.onclick=connectWs;

document.getElementById("fullscreenBtn").onclick=()=>{
document.documentElement.requestFullscreen().catch(e=>console.log(e));
};

let wakeLock=null;
async function enableWakeLock(){
try{wakeLock=await navigator.wakeLock.request("screen");}
catch(e){console.log(e)}
}
document.getElementById("wakeBtn").onclick=enableWakeLock;
document.addEventListener("visibilitychange",()=>{
if(wakeLock!==null && document.visibilityState==="visible")enableWakeLock();
});

async function startMotion(){
statusEl.textContent="requesting permission...";
try{
const needs=typeof DeviceMotionEvent!=="undefined"&&typeof DeviceMotionEvent.requestPermission==="function";

if(needs){
const mp=await DeviceMotionEvent.requestPermission();
let op="granted";

if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
op=await DeviceOrientationEvent.requestPermission();
}

if(mp==="granted"&&op==="granted"){
window.addEventListener("devicemotion",handleMotion);
window.addEventListener("deviceorientation",handleOrientation);
statusEl.textContent="motion ON";
}else{
statusEl.textContent="motion denied → touch fallback";
enableTouchFallback();
}
}else{
window.addEventListener("devicemotion",handleMotion);
window.addEventListener("deviceorientation",handleOrientation);
statusEl.textContent="motion ON";
}
}catch(e){
statusEl.textContent="error: "+e;
}
}
startBtn.onclick=startMotion;

function handleOrientation(e){
beta=e.beta||0;
gamma=e.gamma||0;
}

function sendState(){
const now = Date.now();
if(now - lastSendTime < SEND_INTERVAL_MS) return;
lastSendTime = now;

if(!connected||!ws||ws.readyState!==1)return;

ws.send(JSON.stringify({
type:"update",
role:roleSelect.value,
mode:modeSelect.value,
scene:sceneSelect.value,
source:"phone",
sx:Number(filteredX.toFixed(4)),
sy:Number(filteredY.toFixed(4)),
energy:Number(motionEnergy.toFixed(4)),
tiltX:Number(gamma.toFixed(4)),
tiltY:Number(beta.toFixed(4))
}));
}

function handleMotion(e){
const acc=e.accelerationIncludingGravity||e.acceleration||{x:0,y:0,z:0};
ax=acc.x||0;ay=acc.y||0;az=acc.z||0;

const scene=getSceneParams(sceneSelect.value);

if(modeSelect.value==="tilt"){
filteredX=attackRelease(filteredX,clamp(Math.abs(gamma)/18,0,2.5),scene.attackTilt,scene.releaseTilt);
filteredY=attackRelease(filteredY,clamp(Math.abs(beta)/22,0,2.5),scene.attackTilt,scene.releaseTilt);
}else{
filteredX=attackRelease(filteredX,clamp(Math.abs(ax),0,10),scene.attackImpulse,scene.releaseImpulse);
filteredY=attackRelease(filteredY,clamp(Math.abs(ay),0,10),scene.attackImpulse,scene.releaseImpulse);
}

motionEnergy=attackRelease(
motionEnergy,
clamp(Math.abs(ax)+Math.abs(ay)+Math.abs(az-9.81),0,24),
scene.energyAttack,
scene.energyRelease
);

statusEl.textContent=`${roleSelect.value} | ${modeSelect.value} | Scene ${sceneSelect.value} | sx:${filteredX.toFixed(2)} sy:${filteredY.toFixed(2)} e:${motionEnergy.toFixed(2)} ${connected?"| ws ok":"| ws off"}`;

sendState();
}

function enableTouchFallback(){
canvas.addEventListener("pointerdown",handleTouch);
canvas.addEventListener("pointermove",handleTouch);
canvas.addEventListener("pointerup",()=>{
lastTouchX=null;
lastTouchY=null;
motionEnergy*=0.7;
sendState();
});
}

function handleTouch(e){
const rect=canvas.getBoundingClientRect();
const x=clamp((e.clientX-rect.left)/rect.width,0,1);
const y=clamp((e.clientY-rect.top)/rect.height,0,1);

let speed=0;
if(lastTouchX!==null){
const dx=x-lastTouchX;
const dy=y-lastTouchY;
speed=clamp(Math.sqrt(dx*dx+dy*dy)*20,0,10);
}

lastTouchX=x;
lastTouchY=y;

filteredX=x*4.0;
filteredY=y*4.0;
motionEnergy=clamp(1.5+speed*3.0,0,10);

gamma=(x-.5)*90;
beta=(y-.5)*90;

sendState();
}

function getSceneParams(scene){
if(scene==="A")return{attackImpulse:.18,releaseImpulse:.07,attackTilt:.14,releaseTilt:.08,energyAttack:.18,energyRelease:.06,baseSize:.02,scaleGain:.24,maxScale:1.75,brightnessBase:.18,brightnessGain:.12,globalAmbient:.16,glowSpread:1.32,formAlpha:.58,formGlow:28,glowColor:[255,255,255],invertMode:false};
if(scene==="B")return{attackImpulse:.88,releaseImpulse:.18,attackTilt:.65,releaseTilt:.18,energyAttack:.80,energyRelease:.14,baseSize:.03,scaleGain:.38,maxScale:2.4,brightnessBase:.26,brightnessGain:.24,globalAmbient:.20,glowSpread:1.38,formAlpha:1,formGlow:10,glowColor:[255,255,255],invertMode:false};
if(scene==="C")return{attackImpulse:.86,releaseImpulse:.06,attackTilt:.62,releaseTilt:.08,energyAttack:.82,energyRelease:.06,baseSize:.05,scaleGain:.58,maxScale:3.35,brightnessBase:.52,brightnessGain:.58,globalAmbient:.42,glowSpread:1.42,formAlpha:.96,formGlow:34,glowColor:[255,225,150],invertMode:false};
return{attackImpulse:.86,releaseImpulse:.06,attackTilt:.66,releaseTilt:.08,energyAttack:.82,energyRelease:.06,baseSize:.03,scaleGain:.46,maxScale:3,brightnessBase:.10,brightnessGain:.72,globalAmbient:.14,glowSpread:1.40,formAlpha:.72,formGlow:42,glowColor:[255,255,255],invertMode:true};
}

function getRoleColor(role){
if(role==="Piano1")return[255,120,200];
if(role==="Piano2")return[120,255,120];
if(role==="Perc1")return[255,100,100];
if(role==="Perc2")return[100,120,255];
return[255,255,255];
}

function drawGlow(cx,cy,rgb,alpha,w,h,spread){
const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(w,h)*spread);
g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`);
g.addColorStop(.38,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha*.45})`);
g.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
ctx.fillStyle=g;
ctx.fillRect(0,0,w,h);
}

function drawRolePreview(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight*.76;

const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2;
const scene=getSceneParams(sceneSelect.value);
const e=clamp(motionEnergy/10,0,1);
const active=clamp(scene.brightnessBase+e*scene.brightnessGain,scene.brightnessBase,1);

ctx.clearRect(0,0,w,h);
ctx.fillStyle="rgb(5,5,5)";
ctx.fillRect(0,0,w,h);

drawGlow(w*.25,h*.25,[255,120,200],roleSelect.value==="Piano1"?active:scene.globalAmbient,w,h,scene.glowSpread);
drawGlow(w*.75,h*.25,[120,255,120],roleSelect.value==="Piano2"?active:scene.globalAmbient,w,h,scene.glowSpread);
drawGlow(w*.25,h*.75,[255,100,100],roleSelect.value==="Perc1"?active:scene.globalAmbient,w,h,scene.glowSpread);
drawGlow(w*.75,h*.75,[100,120,255],roleSelect.value==="Perc2"?active:scene.globalAmbient,w,h,scene.glowSpread);

const sx=clamp(scene.baseSize+filteredX*scene.scaleGain,scene.baseSize,scene.maxScale);
const sy=clamp(scene.baseSize+filteredY*scene.scaleGain,scene.baseSize,scene.maxScale);

ctx.save();
ctx.shadowColor=`rgba(${scene.glowColor[0]},${scene.glowColor[1]},${scene.glowColor[2]},.95)`;
ctx.shadowBlur=scene.formGlow+filteredX*8+filteredY*8+e*12;

const col=getRoleColor(roleSelect.value);

ctx.fillStyle=scene.invertMode
?`rgba(${Math.round(col[0]*.55)},${Math.round(col[1]*.55)},${Math.round(col[2]*.55)},${scene.formAlpha})`
:`rgba(255,255,255,${scene.formAlpha})`;

if(roleSelect.value==="Piano1"){
ctx.beginPath();ctx.ellipse(cx,cy,48*sx,48*sy,0,0,Math.PI*2);ctx.fill();
}else if(roleSelect.value==="Piano2"){
const r=44;ctx.beginPath();
for(let i=0;i<5;i++){
const a=-Math.PI/2+i*2*Math.PI/5;
const x=cx+Math.cos(a)*r*sx;
const y=cy+Math.sin(a)*r*sy;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.closePath();ctx.fill();
}else if(roleSelect.value==="Perc1"){
ctx.beginPath();ctx.moveTo(cx,cy-42*sy);
ctx.lineTo(cx-38*sx,cy+32*sy);
ctx.lineTo(cx+38*sx,cy+32*sy);
ctx.closePath();ctx.fill();
}else{
ctx.fillRect(cx-38*sx,cy-38*sy,76*sx,76*sy);
}

ctx.restore();

requestAnimationFrame(drawRolePreview);
}

drawRolePreview();
</script>

</body>
</html>
